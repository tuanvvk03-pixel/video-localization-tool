# Pre-commit security gate. Activate once per clone:
#   pip install pre-commit
#   pre-commit install
# After that, every `git commit` is scanned locally before it can land.
# Run on the whole repo manually:  pre-commit run --all-files
repos:
  # Secret scanner — blocks commits that contain API keys, tokens, private keys.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key           # PEM / SSH private keys
      - id: check-added-large-files      # avoid committing large blobs
        args: ["--maxkb=4096"]
      - id: check-merge-conflict         # stray <<<<<<< markers
